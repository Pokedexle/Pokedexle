<article
    #card
    class="pokemon-card"
    [style.--card-height]="cardHeightCss"
    [style.--card-name-size]="cardNameSizeCss"
    [style.--card-id-size]="cardIdSizeCss"
    [style.--card-sprite-height]="cardSpriteHeightCss"
    [style.--card-type-height]="cardTypeHeightCss"
    [style.--card-vertical-gap]="cardVerticalGapCss"
    (mouseenter)="onHover()"
    (mouseleave)="onLeave()"
>
    <div class="pokemon-card__media">
        <span class="pokemon-card__id">{{ formattedId }}</span>
        <img id="sprite" [src]="currentImage" [alt]="name" />
    </div>

    <h2 class="pokemon-card__name">{{ name }}</h2>

    <div class="pokemon-card__types">
        @for (type of types; track type) {
            <app-type [currentType]="type"></app-type>
        }
    </div>
</article>
